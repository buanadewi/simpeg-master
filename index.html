<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPEG — Sistem Manajemen Kepegawaian</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --navy: #0a192f;
  --deep-navy: #060e1a;
  --accent: #172a45;
  --blue: #3498db;
  --blue-light: rgba(52,152,219,0.12);
  --white: #ffffff;
  --red: #ef4444;
  --red-light: rgba(239,68,68,0.12);
  --green: #10b981;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --bg: #f8fafc;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#333;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOGIN UI REFINEMENT */
#screen-login {
  position:fixed;inset:0;background:var(--deep-navy);z-index:9999;
  display:flex;align-items:center;justify-content:center;
}
.login-box {
  background:white; padding:40px; border-radius:20px; width:100%; max-width:400px;
  position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.3); text-align:center;
}
.logo-bulat {
  width:100px; height:100px; background:white; border-radius:50%;
  position:absolute; top:-50px; left:50%; transform:translateX(-50%);
  padding:10px; box-shadow:0 10px 20px rgba(0,0,0,0.2);
  display:flex; align-items:center; justify-content:center;
}
.logo-bulat img { width:80%; height:auto; }

/* LAYOUT */
.topbar{background:var(--navy);color:#fff;height:65px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.topbar-right{display:flex;align-items:center;gap:15px}
.admin-bar{background:var(--accent);padding:8px 15px;border-radius:30px;font-size:12px;font-weight:600;color:#94a3b8}

.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;background:var(--deep-navy);color:#cbd5e1;display:flex;flex-direction:column}
.sidebar-item{padding:14px 24px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:#94a3b8}
.sidebar-item.active{background:rgba(52,152,219,0.1);color:var(--blue);border-right:4px solid var(--blue)}

.content{flex:1;overflow-y:auto;padding:30px}
.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px;margin-bottom:20px}

/* SEARCH & BUTTONS */
.search-wrapper { position:relative; flex:1; max-width:400px; }
.search-wrapper i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); }
.search-wrapper input { width:100%; padding:10px 10px 10px 35px; border-radius:8px; border:1px solid var(--border); outline:none; }

.btn{padding:10px 20px;border-radius:8px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px;transition:0.2s}
.btn-blue{background:var(--blue);color:white}
.btn-red{background:var(--red);color:white}
.btn-navy{background:var(--navy);color:white}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:8px}

.peg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.peg-card{background:white;border:1px solid var(--border);padding:20px;border-radius:12px;cursor:pointer;transition:0.3s}
.peg-card:hover{border-color:var(--blue);box-shadow:0 10px 20px rgba(0,0,0,0.05)}

/* MODAL & OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:90%;max-width:500px;overflow:hidden}
.modal-header{padding:20px;background:var(--navy);color:white;font-weight:700}
.modal-body{padding:24px}

/* TABLE DOKUMEN */
.doc-row{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
</style>
</head>
<body>

<div id="loader" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:3000;align-items:center;justify-content:center;flex-direction:column">
    <div style="width:40px;height:40px;border:4px solid #eee;border-top:4px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite"></div>
    <p style="margin-top:10px;font-weight:700">Mohon Tunggu...</p>
</div>

<!-- LOGIN SCREEN -->
<div id="screen-login">
  <div class="login-box">
    <div class="logo-bulat">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Logo_Kementrian_Imigrasi_dan_Pemasyarakatan_%282024%29.png/3840px-Logo_Kementrian_Imigrasi_dan_Pemasyarakatan_%282024%29.png" alt="Kemenimipas">
    </div>
    <h2 style="margin-top:40px;margin-bottom:10px;color:var(--navy)">SIMPEG Login</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-bottom:30px">Sistem Manajemen Kepegawaian</p>
    <form onsubmit="doLogin(event)">
      <input type="text" id="l-user" placeholder="Username" style="width:100%;padding:12px;margin-bottom:15px;border:1px solid var(--border);border-radius:8px" required>
      <input type="password" id="l-pass" placeholder="Password" style="width:100%;padding:12px;margin-bottom:25px;border:1px solid var(--border);border-radius:8px" required>
      <button type="submit" class="btn btn-navy" style="width:100%;justify-content:center">MASUK</button>
    </form>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;flex-direction:column;height:100vh">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:15px;font-weight:800;font-size:18px">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/Logo_Kementrian_Imigrasi_dan_Pemasyarakatan_%282024%29.png/3840px-Logo_Kementrian_Imigrasi_dan_Pemasyarakatan_%282024%29.png" height="40">
      <span>SIMPEG KEMENIMIPAS</span>
    </div>
    <div class="topbar-right">
       <div class="admin-bar">
         <i class="ti ti-user-shield"></i> Administrator Online
       </div>
       <button class="btn btn-red btn-icon" onclick="confirmLogout()" title="Logout"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-item active" id="nav-pegawai" onclick="navTo('pegawai')"><i class="ti ti-users"></i> Data Pegawai</div>
    </div>
    <div class="content">
      <!-- VIEW DATA PEGAWAI -->
      <div id="view-pegawai" class="view">
        <div style="display:flex;justify-content:space-between;margin-bottom:25px;align-items:center">
          <h2>Daftar Pegawai</h2>
          <div style="display:flex;gap:10px;flex:1;justify-content:flex-end">
            <div class="search-wrapper">
              <i class="ti ti-search"></i>
              <input type="text" id="pegawai-search" placeholder="Cari nama atau NIP..." onkeyup="filterPegawai()">
            </div>
            <button class="btn btn-blue" onclick="openModal('modal-add')"><i class="ti ti-plus"></i> Tambah</button>
          </div>
        </div>
        <div id="peg-container" class="peg-grid"></div>
      </div>

      <!-- VIEW DETAIL PEGAWAI -->
      <div id="view-detail" class="view" style="display:none">
        <button class="btn btn-navy" onclick="navTo('pegawai')" style="margin-bottom:20px"><i class="ti ti-arrow-left"></i> Kembali</button>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <div>
               <h3 id="det-nama">Nama Pegawai</h3>
               <p id="det-nip" style="color:var(--text-muted);font-size:14px"></p>
            </div>
            <button class="btn btn-blue" onclick="triggerUpload(null)"><i class="ti ti-upload"></i> Upload Baru</button>
          </div>
          <div id="file-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ADD PEGAWAI -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <div class="modal-header">Tambah Pegawai Baru</div>
    <div class="modal-body">
      <div style="margin-bottom:15px"><label style="display:block;margin-bottom:5px;font-weight:600">Nama Lengkap</label><input type="text" id="f-nama" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px"></div>
      <div style="margin-bottom:15px"><label style="display:block;margin-bottom:5px;font-weight:600">NIP</label><input type="text" id="f-nip" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px"></div>
      <div style="margin-bottom:15px"><label style="display:block;margin-bottom:5px;font-weight:600">Jabatan</label><input type="text" id="f-jabatan" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px"></div>
      <div style="margin-bottom:25px"><label style="display:block;margin-bottom:5px;font-weight:600">Departemen</label><input type="text" id="f-dept" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px"></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-blue" style="flex:1" onclick="savePegawai()">SIMPAN</button>
        <button class="btn" style="flex:1;background:#eee" onclick="closeModal('modal-add')">BATAL</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM LOGOUT -->
<div class="overlay" id="modal-logout">
  <div class="modal" style="max-width:350px;text-align:center">
    <div class="modal-body">
      <i class="ti ti-alert-triangle" style="font-size:48px;color:var(--red)"></i>
      <h3 style="margin:15px 0">Konfirmasi Keluar</h3>
      <p style="color:var(--text-muted);margin-bottom:25px">Apakah Anda yakin ingin keluar dari sistem?</p>
      <div style="display:flex;gap:10px">
        <button class="btn btn-red" style="flex:1" onclick="doLogout()">Keluar</button>
        <button class="btn" style="flex:1;background:#eee" onclick="closeModal('modal-logout')">Batal</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" style="display:none" onchange="handleUpload(this)">

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxw6J726XmR_-xeNkckfdra_09AdVjXkW8HeLemv1_EbwfiP-9ntnc0BHFzq7nnZNoa/exec"; 

let db = { pegawai: [] };
let currentPegIdx = -1;
let currentOldFileId = null; // Penampung ID file saat mode edit file

// --- SESSION CHECK (Fitur: Tidak logout saat refresh) ---
window.onload = () => {
    if (localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        initData();
    }
};

function doLogin(e) {
  e.preventDefault();
  const u = document.getElementById('l-user').value;
  const p = document.getElementById('l-pass').value;
  if(u === 'admin' && p === 'admin123'){
    localStorage.setItem('isLoggedIn', 'true');
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
    initData();
  } else {
    alert("Username/Password salah!");
  }
}

function confirmLogout() { openModal('modal-logout'); }
function doLogout() {
    localStorage.removeItem('isLoggedIn');
    location.reload();
}

// --- DATA LOGIC ---
async function request(action, payload = {}) {
  showLoading(true);
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action, payload })
    });
    const result = await res.json();
    showLoading(false);
    return result;
  } catch (err) {
    showLoading(false);
    alert("Koneksi gagal");
    return null;
  }
}

async function initData() {
  const res = await request("getAppData");
  if(res) {
    db = res;
    renderPegawai();
    if(currentPegIdx !== -1) renderFiles();
  }
}

// Fitur: Filter/Search Pegawai
function filterPegawai() {
  const query = document.getElementById('pegawai-search').value.toLowerCase();
  const filtered = db.pegawai.filter(p => p.nama.toLowerCase().includes(query) || p.nip.toString().includes(query));
  renderPegawai(filtered);
}

function renderPegawai(data = db.pegawai) {
  const container = document.getElementById('peg-container');
  container.innerHTML = data.map((p, idx) => `
    <div class="peg-card" onclick="openDetail(${db.pegawai.indexOf(p)})">
      <div style="display:flex;justify-content:space-between;align-items:start">
        <div>
          <h4 style="margin-bottom:5px;color:var(--navy)">${p.nama}</h4>
          <p style="font-size:12px;color:var(--text-muted)">NIP: ${p.nip}</p>
        </div>
        <button class="btn btn-red btn-icon" onclick="event.stopPropagation(); deletePegawai(${db.pegawai.indexOf(p)})"><i class="ti ti-trash"></i></button>
      </div>
      <div style="margin-top:15px;font-size:13px">
        <div><i class="ti ti-briefcase"></i> ${p.jabatan}</div>
        <div><i class="ti ti-building"></i> ${p.dept}</div>
      </div>
    </div>
  `).join('');
}

function openDetail(idx) {
  currentPegIdx = idx;
  const p = db.pegawai[idx];
  document.getElementById('det-nama').textContent = p.nama;
  document.getElementById('det-nip').textContent = "NIP: " + p.nip;
  renderFiles();
  navTo('detail');
}

// Fitur: Ganti tombol lihat/hapus jadi icon mata dan trash
function renderFiles() {
  const list = document.getElementById('file-list');
  const files = db.pegawai[currentPegIdx].files || [];
  list.innerHTML = files.map(f => `
    <div class="doc-row">
      <div style="display:flex;align-items:center;gap:10px">
        <i class="ti ti-file-text" style="color:var(--blue);font-size:20px"></i>
        <span style="font-size:14px">${f.name}</span>
      </div>
      <div style="display:flex;gap:8px">
        <!-- Edit File (Ganti Baru) -->
        <button class="btn btn-navy btn-icon" onclick="triggerUpload('${f.driveId}')" title="Ganti File"><i class="ti ti-edit"></i></button>
        <!-- Lihat (Mata) -->
        <a href="${f.url}" target="_blank" class="btn btn-blue btn-icon"><i class="ti ti-eye"></i></a>
        <!-- Hapus (Trash) -->
        <button class="btn btn-red btn-icon" onclick="deleteFile('${f.driveId}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>
  `).join('');
}

async function savePegawai() {
  const p = {
    nama: document.getElementById('f-nama').value,
    nip: document.getElementById('f-nip').value,
    jabatan: document.getElementById('f-jabatan').value,
    dept: document.getElementById('f-dept').value
  };
  if(!p.nama || !p.nip) return alert("Nama & NIP wajib diisi");
  const res = await request("addPegawai", p);
  if(res && res.status === "success") {
    closeModal('modal-add');
    initData();
  } else if (res) {
    alert(res.message); // Menampilkan pesan NIP duplikat
  }
}

// Fitur: Edit file (Ganti dengan file baru)
function triggerUpload(oldFileId) {
  currentOldFileId = oldFileId;
  document.getElementById('file-input').click();
}

function handleUpload(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const p = db.pegawai[currentPegIdx];
    const res = await request("uploadFile", { 
        base64: e.target.result, 
        fileName: file.name, 
        pegawaiId: p.id, 
        folderId: p.folderId,
        oldDriveId: currentOldFileId
    });
    if(res && res.status === "success") { 
        input.value = ""; 
        currentOldFileId = null;
        initData(); 
    }
  };
  reader.readAsDataURL(file);
}

async function deleteFile(id) {
  if(!confirm("Hapus file ini secara permanen?")) return;
  const res = await request("deleteFile", { driveId: id });
  if(res) initData();
}

async function deletePegawai(idx) {
  if(!confirm("Hapus seluruh data & folder pegawai ini?")) return;
  const p = db.pegawai[idx];
  const res = await request("removePegawai", { id: p.id, folderId: p.folderId });
  if(res) initData();
}

function navTo(v) {
  document.querySelectorAll('.view').forEach(el => el.style.display = 'none');
  document.getElementById('view-' + v).style.display = 'block';
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showLoading(b) { document.getElementById('loader').style.display = b ? 'flex' : 'none'; }
@keyframes spin { to { transform: rotate(360deg); } }
</script>
</body>
</html>
